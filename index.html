    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>

</header>

<!-- ================= MENÚ LATERAL ================= -->
<div id="menuLateral" class="menu-lateral">

  <a href="reservas.html" class="item-link">
    <div class="item">
      <img src="IMAGENES/reservas_img.webp" alt="Reservas">
      <div class="item-info">
        <h2>Reservas</h2>
      </div>
    </div>
  </a>

  <a href="break.html" class="item-link">

  </a>

      <div class="item-info">
        <h2>PQRS</h2>
      </div>
    </div>
  </a>

</div>

<div class="search-bar">
